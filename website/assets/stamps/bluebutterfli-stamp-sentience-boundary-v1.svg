  <defs>
    <filter id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="2" seed="31"/>
      <feDisplacementMap in="SourceGraphic" scale="1.45"/>
    </filter>
  </defs>
  <g filter="url(#ink)" fill="none" stroke="#c6524b" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 94 430 388H82Z" stroke-width="12" opacity=".92"/>
