    <text x="256" y="367" font-size="17" letter-spacing="2.4">BB-04  |  NO CERTIFICATION</text>
    <text x="256" y="454" font-size="18" letter-spacing="2.2">HUMAN REVIEWED - SHA-256 RECORD</text>
